<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary": "#a1d2ac",
            "outline-variant": "#414845",
            "on-surface": "#c5ebdb",
            "surface-container-low": "#002118",
            "surface-container-lowest": "#00120c",
            "on-primary-fixed": "#002115",
            "error-container": "#93000a",
            "inverse-surface": "#c5ebdb",
            "surface-container-highest": "#183b30",
            "inverse-on-surface": "#14362c",
            "tertiary-fixed-dim": "#ebc165",
            "on-tertiary-container": "#b08b36",
            "surface": "#001710",
            "tertiary-fixed": "#ffdf9e",
            "tertiary-container": "#372700",
            "on-tertiary-fixed-variant": "#5b4300",
            "on-secondary-fixed-variant": "#224f33",
            "on-secondary-fixed": "#00210e",
            "secondary-fixed-dim": "#a1d2ac",
            "primary-fixed-dim": "#98d3b7",
            "on-error-container": "#ffdad6",
            "on-tertiary": "#3f2e00",
            "surface-dim": "#001710",
            "outline": "#8b928e",
            "surface-variant": "#183b30",
            "background": "#001710",
            "on-primary": "#003827",
            "on-primary-fixed-variant": "#13503b",
            "surface-tint": "#98d3b7",
            "secondary-fixed": "#bcefc7",
            "on-tertiary-fixed": "#261a00",
            "on-secondary": "#07381e",
            "inverse-primary": "#2f6952",
            "on-surface-variant": "#c1c8c4",
            "surface-container-high": "#0c3026",
            "surface-bright": "#1d3f35",
            "primary-fixed": "#b3f0d2",
            "error": "#ffb4ab",
            "primary": "#98d3b7",
            "on-secondary-container": "#93c49f",
            "on-primary-container": "#629c82",
            "tertiary": "#ebc165",
            "on-error": "#690005",
            "primary-container": "#003021",
            "surface-container": "#00251b",
            "secondary-container": "#255235",
            "on-background": "#c5ebdb"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Manrope"],
            "label": ["Plus Jakarta Sans"]
          },
          boxShadow: {
            glow: "0 0 40px rgba(235, 193, 101, 0.18)",
            glowStrong: "0 0 60px rgba(235, 193, 101, 0.28)"
          }
        },
      },
    }
  </script>

  <style>
    .circuit-pattern {
      background-image:
        radial-gradient(circle at 2px 2px, rgba(152, 211, 183, 0.045) 1px, transparent 0);
      background-size: 24px 24px;
    }

    .logo-ring {
      background:
        radial-gradient(circle, rgba(201, 162, 74, 0.18) 0%, rgba(201, 162, 74, 0.08) 35%, rgba(201, 162, 74, 0.02) 60%, transparent 75%);
    }

    .logo-circle {
      overflow: hidden;
    }

    .title-glow {
      text-shadow: 0 0 16px rgba(201, 162, 74, 0.12);
    }

    .deer-img {
      width: 70%;
      height: 70%;
      object-fit: cover;
      border-radius: 50%;
      filter:
        drop-shadow(0 0 18px rgba(201, 162, 74, 0.4)) brightness(1.15) contrast(1.1);
    }

    body {
      min-height: 100dvh;
    }
  </style>
</head>

<body class="bg-surface text-on-surface font-body overflow-x-hidden">
  <main class="relative min-h-screen w-full overflow-hidden flex items-center justify-center">
    <!-- Fundo -->
    <div class="absolute inset-0 circuit-pattern pointer-events-none"></div>
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(31,90,68,0.20),transparent_35%),linear-gradient(to_bottom,rgba(0,23,16,0.95),rgba(0,18,12,1))] pointer-events-none">
    </div>
    <div
      class="absolute inset-0 bg-gradient-to-b from-surface via-transparent to-surface-container-low opacity-90 pointer-events-none">
    </div>
    <div
      class="absolute left-1/2 top-[34%] -translate-x-1/2 -translate-y-1/2 w-[85vw] max-w-[700px] aspect-square rounded-full bg-primary-container/20 blur-[120px] pointer-events-none">
    </div>

    <!-- Container central -->
    <section
      class="relative z-10 w-full max-w-[460px] lg:max-w-[560px] mx-auto px-6 sm:px-8 py-10 sm:py-14 min-h-screen flex flex-col items-center justify-between">

      <!-- topo vazio para respiro -->
      <div class="h-4 sm:h-6"></div>

      <!-- conteúdo principal -->
      <div class="w-full flex flex-col items-center text-center">
        <!-- Logo com destaque circular -->
        <div class="relative mb-6 sm:mb-8">
          <div class="logo-ring absolute inset-0 scale-[1.45] rounded-full blur-2xl"></div>

          <div class="logo-circle relative rounded-full flex items-center justify-center
                      w-32 h-32
                      sm:w-40 sm:h-40
                      md:w-44 md:h-44">
            <img alt="Logo do Anhangá" class="deer-img object-contain
                     w-[60%] h-[60%]"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqopGSORSKiC2HXLsR1SGnSG_5HnbU0RAX5XmbrwGDrBhrM7Z3mfHuGOBjxkd0ll7k0vUUnufoDgVneJ3oqE7m9rcbZ8grNqQPMMM0y-S6K-kS2HnkLB1A3AQVvSNV955BIeeYJPrFcQUC0-haUcSSZJT8sGmLcTruvy1Gr785WyALUxRoqfpW2ajrSybRvjytI1U9he9qxbNXsh-HiaImNnxaMo6GQHzw7zsS9ffrWsNF3h7XbWqkeUt1HE2Dz_dnCdGBHCtVWi8" />
          </div>
        </div>

        <!-- Título -->
        <h1 class="title-glow font-headline font-extrabold uppercase tracking-tight text-tertiary
                   text-[1.75rem] leading-none
                   sm:text-2xl
                   md:text-3xl">
          Recuperar Senha
        </h1>

        <p class="mt-2 text-sm text-on-surface-variant">
          Informe seus dados para verificar sua identidade
        </p>

        <!-- Formulário de validação -->
        <div id="validationForm" class="mt-6 w-full max-w-[320px] space-y-3 text-left">
          <div>
            <label
              class="mb-1 block font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Email</label>
            <input id="email"
              class="w-full rounded-xl border border-outline-variant bg-surface-container-low px-4 py-3 text-on-surface placeholder:text-on-surface-variant/60"
              placeholder="seu@email.com" type="email" />
          </div>
          <div>
            <label
              class="mb-1 block font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Nome Completo</label>
            <input id="nome"
              class="w-full rounded-xl border border-outline-variant bg-surface-container-low px-4 py-3 text-on-surface placeholder:text-on-surface-variant/60"
              placeholder="Seu nome completo" />
          </div>
          <div>
            <label
              class="mb-1 block font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Data de Nascimento</label>
            <input id="dataNasc"
              class="w-full rounded-xl border border-outline-variant bg-surface-container-low px-4 py-3 text-on-surface placeholder:text-on-surface-variant/60"
              placeholder="DD/MM/AAAA" type="text" maxlength="10" />
          </div>
          <p id="message" class="min-h-[18px] text-xs text-on-surface-variant"></p>
        </div>

        <!-- Formulário de nova senha (oculto inicialmente) -->
        <div id="newPasswordForm" class="hidden mt-6 w-full max-w-[320px] space-y-3 text-left">
          <div>
            <label
              class="mb-1 block font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Nova Senha</label>
            <input id="newPassword" type="password"
              class="w-full rounded-xl border border-outline-variant bg-surface-container-low px-4 py-3 text-on-surface placeholder:text-on-surface-variant/60"
              placeholder="Mínimo 8 caracteres" />
          </div>
          <div>
            <label
              class="mb-1 block font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Confirmar Senha</label>
            <input id="confirmPassword" type="password"
              class="w-full rounded-xl border border-outline-variant bg-surface-container-low px-4 py-3 text-on-surface placeholder:text-on-surface-variant/60"
              placeholder="Repita a senha" />
          </div>
          <p id="passwordMessage" class="min-h-[18px] text-xs text-on-surface-variant"></p>
        </div>

        <!-- Botão de validação -->
        <button id="validateBtn" class="mt-5 sm:mt-6 w-full max-w-[250px] rounded-2xl px-8 py-4
                       bg-[#C9A24A] text-[#0B2F25] font-headline font-bold uppercase
                       tracking-[0.18em] text-base sm:text-lg
                       transition-all duration-300
                       hover:scale-[1.03] hover:shadow-glowStrong
                       active:scale-95">
          Validar Dados
        </button>

        <!-- Botão de salvar senha (oculto inicialmente) -->
        <button id="savePasswordBtn" class="hidden mt-5 sm:mt-6 w-full max-w-[250px] rounded-2xl px-8 py-4
                       bg-[#C9A24A] text-[#0B2F25] font-headline font-bold uppercase
                       tracking-[0.18em] text-base sm:text-lg
                       transition-all duration-300
                       hover:scale-[1.03] hover:shadow-glowStrong
                       active:scale-95">
          Salvar Nova Senha
        </button>

        <p class="mt-4 text-xs">
          <a href="login.html" class="text-primary hover:text-tertiary transition-colors">Voltar ao Login</a>
        </p>
      </div>

      <!-- Rodapé -->
      <div class="w-full flex flex-col items-center gap-5 pb-2 sm:pb-4">
        <div class="w-full max-w-[220px] h-px bg-gradient-to-r from-transparent via-tertiary/40 to-transparent"></div>

        <div class="flex items-center gap-3 text-center">
          <span class="material-symbols-outlined text-tertiary text-sm">sensors</span>
          <span
            class="font-label text-[11px] sm:text-xs uppercase tracking-[0.30em] text-on-surface-variant font-semibold">
            Inteligência Florestal
          </span>
        </div>
      </div>
    </section>

    <!-- moldura sutil apenas em telas maiores -->
    <div
      class="pointer-events-none fixed inset-0 z-50 hidden md:block border-[1.25rem] lg:border-[2rem] border-surface">
    </div>
  </main>

  <script>
    const API_BASE = "/api";
    const emailInput = document.getElementById("email");
    const nomeInput = document.getElementById("nome");
    const dataNascInput = document.getElementById("dataNasc");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const validateBtn = document.getElementById("validateBtn");
    const savePasswordBtn = document.getElementById("savePasswordBtn");
    const message = document.getElementById("message");
    const passwordMessage = document.getElementById("passwordMessage");
    const validationForm = document.getElementById("validationForm");
    const newPasswordForm = document.getElementById("newPasswordForm");

    let validatedUsername = null;

    // Máscara para data de nascimento
    dataNascInput.addEventListener("input", (e) => {
      let value = e.target.value.replace(/\D/g, "");
      if (value.length > 8) value = value.slice(0, 8);
      
      if (value.length >= 4) {
        value = value.slice(0, 2) + "/" + value.slice(2, 4) + "/" + value.slice(4);
      } else if (value.length >= 2) {
        value = value.slice(0, 2) + "/" + value.slice(2);
      }
      
      e.target.value = value;
    });

    async function validateData() {
      const email = emailInput.value.trim();
      const nome = nomeInput.value.trim();
      const dataNasc = dataNascInput.value.trim();

      if (!email || !nome || !dataNasc) {
        message.textContent = "Preencha todos os campos.";
        message.className = "min-h-[18px] text-xs text-error";
        return;
      }

      // Validar formato da data
      const dateRegex = /^\d{2}\/\d{2}\/\d{4}$/;
      if (!dateRegex.test(dataNasc)) {
        message.textContent = "Data deve estar no formato DD/MM/AAAA.";
        message.className = "min-h-[18px] text-xs text-error";
        return;
      }

      validateBtn.disabled = true;
      validateBtn.textContent = "Validando...";
      message.textContent = "";

      try {
        const response = await fetch(`${API_BASE}/auth/validate-recovery`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, nome, data_nasc: dataNasc })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Dados não encontrados.");
        }

        validatedUsername = payload.username;
        message.textContent = "Dados validados! Defina sua nova senha.";
        message.className = "min-h-[18px] text-xs text-primary";

        // Mostrar formulário de nova senha
        validationForm.classList.add("hidden");
        validateBtn.classList.add("hidden");
        newPasswordForm.classList.remove("hidden");
        savePasswordBtn.classList.remove("hidden");
      } catch (error) {
        message.textContent = error.message || "Erro ao validar dados.";
        message.className = "min-h-[18px] text-xs text-error";
      } finally {
        validateBtn.disabled = false;
        validateBtn.textContent = "Validar Dados";
      }
    }

    async function saveNewPassword() {
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!newPassword || !confirmPassword) {
        passwordMessage.textContent = "Preencha ambos os campos de senha.";
        passwordMessage.className = "min-h-[18px] text-xs text-error";
        return;
      }

      if (newPassword.length < 8) {
        passwordMessage.textContent = "A senha deve ter no mínimo 8 caracteres.";
        passwordMessage.className = "min-h-[18px] text-xs text-error";
        return;
      }

      if (newPassword !== confirmPassword) {
        passwordMessage.textContent = "As senhas não coincidem.";
        passwordMessage.className = "min-h-[18px] text-xs text-error";
        return;
      }

      savePasswordBtn.disabled = true;
      savePasswordBtn.textContent = "Salvando...";
      passwordMessage.textContent = "";

      try {
        const response = await fetch(`${API_BASE}/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: validatedUsername, new_password: newPassword })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Erro ao redefinir senha.");
        }

        passwordMessage.textContent = "Senha redefinida com sucesso! Redirecionando...";
        passwordMessage.className = "min-h-[18px] text-xs text-primary";

        setTimeout(() => {
          window.location.href = "./login.html";
        }, 2000);
      } catch (error) {
        passwordMessage.textContent = error.message || "Erro ao redefinir senha.";
        passwordMessage.className = "min-h-[18px] text-xs text-error";
      } finally {
        savePasswordBtn.disabled = false;
        savePasswordBtn.textContent = "Salvar Nova Senha";
      }
    }

    validateBtn.addEventListener("click", validateData);
    savePasswordBtn.addEventListener("click", saveNewPassword);
    confirmPasswordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        saveNewPassword();
      }
    });
  </script>
</body>

</html>
