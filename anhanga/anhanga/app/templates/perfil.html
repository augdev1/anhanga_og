<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil - ANHANGÁ</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <style>
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    body { font-family: 'Manrope', sans-serif; background: #001710; color: #c5ebdb; }
    .bg-surface { background: #0c3026; }
    .text-primary { color: #98d3b7; }
    .bg-primary { background: #98d3b7; }
    .text-error { color: #ff6b6b; }
    .bg-error { background: #ff6b6b; }
    .border-primary { border-color: #98d3b7; }
  </style>
</head>
<body class="min-h-screen pb-24">

  <!-- Header -->
  <header class="fixed top-0 z-50 flex h-16 w-full items-center justify-between bg-[#001710]/80 px-4 sm:px-6 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-full border border-[#98d3b7]/20 bg-[#003021] flex items-center justify-center">
        <span class="material-symbols-outlined text-[#98d3b7]">person</span>
      </div>
      <span class="font-bold text-lg text-[#98d3b7]">Meu Perfil</span>
    </div>

    <div class="flex items-center gap-3">
      <span id="userBadge" class="hidden items-center gap-1.5 rounded-full bg-[#183b30]/60 px-3 py-1 text-xs font-semibold text-[#98d3b7]">
        <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">person</span>
        <span id="userBadgeName"></span>
      </span>
      <button id="logoutBtn" class="hidden h-10 w-10 items-center justify-center rounded-full bg-[#183b30]/60 text-[#ff6b6b] hover:opacity-80" title="Sair">
        <span class="material-symbols-outlined text-sm">logout</span>
      </button>
      <a href="./mapa.html" class="h-10 w-10 flex items-center justify-center rounded-full bg-[#183b30]/60 text-[#98d3b7]">
        <span class="material-symbols-outlined">map</span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="pt-24 px-4 sm:px-6 max-w-2xl mx-auto space-y-6">

    <!-- Loading -->
    <div id="loadingMsg" class="text-center py-12">
      <span class="material-symbols-outlined text-4xl animate-spin">refresh</span>
      <p class="mt-2 text-[#8b928e]">Carregando perfil...</p>
    </div>

    <!-- Profile Content -->
    <div id="profileContent" class="hidden space-y-6">

      <!-- Foto Section -->
      <div class="bg-[#0c3026] rounded-2xl p-6 text-center">
        <div class="relative inline-block">
          <div id="fotoPreview" class="h-32 w-32 rounded-full bg-[#183b30] flex items-center justify-center border-4 border-[#98d3b7]/20 overflow-hidden">
            <span class="material-symbols-outlined text-6xl text-[#98d3b7]">person</span>
          </div>
          <label for="fotoInput" class="absolute bottom-0 right-0 h-10 w-10 rounded-full bg-[#98d3b7] flex items-center justify-center cursor-pointer hover:opacity-80 shadow-lg">
            <span class="material-symbols-outlined text-[#001710]">photo_camera</span>
          </label>
          <input type="file" id="fotoInput" accept="image/*" class="hidden" />
        </div>
        <h2 id="profileName" class="mt-4 text-xl font-bold"></h2>
        <p id="profileUsername" class="text-[#8b928e] text-sm"></p>
        <span id="userTypeBadge" class="mt-2 inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium"></span>
      </div>

      <!-- Dados Pessoais -->
      <div class="bg-[#0c3026] rounded-2xl p-6">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined">badge</span>
          Dados Pessoais
        </h3>

        <div class="space-y-4">
          <div>
            <label class="block text-xs text-[#8b928e] mb-1">Nome Completo</label>
            <input id="name" type="text" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
          </div>

          <div>
            <label class="block text-xs text-[#8b928e] mb-1">Email</label>
            <input id="email" type="email" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-[#8b928e] mb-1">Data de Nascimento</label>
              <input id="data_nasc" type="date" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-[#8b928e] mb-1">Telefone</label>
              <input id="telefone" type="tel" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" placeholder="(99) 99999-9999" />
            </div>
          </div>

          <button id="saveProfileBtn" class="w-full rounded-xl bg-[#98d3b7] py-3 font-bold text-[#001710] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">save</span>
            Salvar Dados
          </button>
        </div>
      </div>

      <!-- Alterar Senha -->
      <div class="bg-[#0c3026] rounded-2xl p-6">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined">lock</span>
          Alterar Senha
        </h3>

        <div class="space-y-4">
          <div>
            <label class="block text-xs text-[#8b928e] mb-1">Senha Atual</label>
            <input id="currentPassword" type="password" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
          </div>

          <div>
            <label class="block text-xs text-[#8b928e] mb-1">Nova Senha</label>
            <input id="newPassword" type="password" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
          </div>

          <div>
            <label class="block text-xs text-[#8b928e] mb-1">Confirmar Nova Senha</label>
            <input id="confirmPassword" type="password" class="w-full rounded-xl border border-[#98d3b7]/20 bg-[#001710] px-4 py-3 text-[#c5ebdb] focus:border-[#98d3b7] focus:outline-none" />
          </div>

          <button id="changePasswordBtn" class="w-full rounded-xl bg-[#183b30] py-3 font-bold text-[#98d3b7] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">key</span>
            Alterar Senha
          </button>
        </div>

        <p id="passwordMsg" class="mt-3 text-xs text-center"></p>
      </div>

    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 z-50 flex w-full items-center justify-around rounded-t-[1.5rem] border-t border-[#98d3b7]/15 bg-[#183b30]/60 px-2 pb-4 pt-3 backdrop-blur-xl sm:px-4 sm:pb-6 md:bottom-4 md:left-1/2 md:w-auto md:min-w-[520px] md:max-w-[90vw] md:-translate-x-1/2 md:rounded-2xl md:border md:border-[#98d3b7]/20 md:px-5 md:pb-3 md:pt-2">
    <a href="./mapa.html" class="flex flex-col items-center justify-center px-3 py-1.5 text-[#c1c8c4] hover:text-[#98d3b7]">
      <span class="material-symbols-outlined">map</span>
      <span class="text-[9px] sm:text-[10px]">Mapa</span>
    </a>
    <a href="./insights.html" class="flex flex-col items-center justify-center px-3 py-1.5 text-[#c1c8c4] hover:text-[#98d3b7]">
      <span class="material-symbols-outlined">analytics</span>
      <span class="text-[9px] sm:text-[10px]">Insights</span>
    </a>
    <a href="./monitoramento.html" class="flex flex-col items-center justify-center px-3 py-1.5 text-[#c1c8c4] hover:text-[#98d3b7]">
      <span class="material-symbols-outlined">videocam</span>
      <span class="text-[9px] sm:text-[10px]">Ao Vivo</span>
    </a>
    <a href="./reportar.html" class="flex flex-col items-center justify-center px-3 py-1.5 text-[#c1c8c4] hover:text-[#ef4444]">
      <span class="material-symbols-outlined">report</span>
      <span class="text-[9px] sm:text-[10px]">Reportar</span>
    </a>
    <a href="./login.html" class="flex flex-col items-center justify-center rounded-xl bg-[#ebc165] px-3 py-1.5 text-[#3f2e00] active:scale-95">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">person</span>
      <span class="text-[9px] sm:text-[10px]">Perfil</span>
    </a>
  </nav>

  <script>
    const API_BASE = "/api";
    const token = localStorage.getItem("ANHANGA_TOKEN") || "";
    let user = null;
    try { user = JSON.parse(localStorage.getItem("ANHANGA_USER") || "null"); } catch(_) {}

    // Proteção
    if (!token) {
      window.location.href = "login.html";
    }

    // Mostrar user badge
    const userBadge = document.getElementById("userBadge");
    const userBadgeName = document.getElementById("userBadgeName");
    const logoutBtn = document.getElementById("logoutBtn");

    if (user && token) {
      userBadge.classList.remove("hidden");
      userBadge.classList.add("flex");
      userBadgeName.textContent = user.name || user.username || "Usuário";
      logoutBtn.classList.remove("hidden");
      logoutBtn.classList.add("flex");
    }

    // Logout
    logoutBtn?.addEventListener("click", async () => {
      try {
        await fetch(`${API_BASE}/auth/logout`, {
          method: "POST",
          headers: token ? { Authorization: `Bearer ${token}` } : {}
        });
      } catch(_) {}
      localStorage.removeItem("ANHANGA_TOKEN");
      localStorage.removeItem("ANHANGA_USER");
      window.location.href = "login.html";
    });

    // Carregar perfil
    async function loadProfile() {
      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          window.location.href = "login.html";
          return;
        }

        const data = await res.json();
        const userData = data.user;

        // Atualizar UI
        document.getElementById("profileName").textContent = userData.name || userData.username;
        document.getElementById("profileUsername").textContent = `@${userData.username}`;

        // Badge de tipo
        const typeBadge = document.getElementById("userTypeBadge");
        if (userData.user_type === 1) {
          typeBadge.className = "mt-2 inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-[#ebc165]/20 text-[#ebc165]";
          typeBadge.innerHTML = '<span class="material-symbols-outlined text-xs">star</span> Especial';
        } else {
          typeBadge.className = "mt-2 inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-[#c5ebdb]/20 text-[#c5ebdb]";
          typeBadge.textContent = "Normal";
        }

        // Preencher formulário
        document.getElementById("name").value = userData.name || "";
        document.getElementById("email").value = userData.email || "";
        document.getElementById("data_nasc").value = userData.data_nasc || "";
        document.getElementById("telefone").value = userData.telefone || "";

        // Foto
        if (userData.foto_url) {
          document.getElementById("fotoPreview").innerHTML = `<img src="${userData.foto_url}" class="h-full w-full object-cover" />`;
        }

        document.getElementById("loadingMsg").classList.add("hidden");
        document.getElementById("profileContent").classList.remove("hidden");
      } catch (err) {
        console.error("Erro ao carregar perfil:", err);
        window.location.href = "login.html";
      }
    }

    // Upload de foto
    document.getElementById("fotoInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(`${API_BASE}/user/foto`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        });

        if (!res.ok) throw new Error("Erro ao fazer upload");

        const data = await res.json();
        document.getElementById("fotoPreview").innerHTML = `<img src="${data.foto_url}" class="h-full w-full object-cover" />`;

        // Atualizar localStorage
        user.foto_url = data.foto_url;
        localStorage.setItem("ANHANGA_USER", JSON.stringify(user));

        alert("Foto atualizada com sucesso!");
      } catch (err) {
        alert("Erro ao fazer upload da foto");
      }
    });

    // Salvar dados
    document.getElementById("saveProfileBtn").addEventListener("click", async () => {
      const btn = document.getElementById("saveProfileBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Salvando...';

      try {
        const res = await fetch(`${API_BASE}/user/profile`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            data_nasc: document.getElementById("data_nasc").value,
            telefone: document.getElementById("telefone").value
          })
        });

        if (!res.ok) {
          const data = await res.json();
          alert(data.detail || "Erro ao salvar");
          return;
        }

        const data = await res.json();

        // Atualizar localStorage
        user.name = data.user.name;
        user.email = data.user.email;
        user.data_nasc = data.user.data_nasc;
        user.telefone = data.user.telefone;
        localStorage.setItem("ANHANGA_USER", JSON.stringify(user));

        // Atualizar badge
        userBadgeName.textContent = user.name || user.username;
        document.getElementById("profileName").textContent = user.name || user.username;

        alert("Dados salvos com sucesso!");
      } catch (err) {
        alert("Erro ao salvar dados");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">save</span> Salvar Dados';
      }
    });

    // Alterar senha
    document.getElementById("changePasswordBtn").addEventListener("click", async () => {
      const currentPassword = document.getElementById("currentPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const msg = document.getElementById("passwordMsg");

      if (!currentPassword || !newPassword || !confirmPassword) {
        msg.textContent = "Preencha todos os campos";
        msg.className = "mt-3 text-xs text-center text-[#ff6b6b]";
        return;
      }

      if (newPassword !== confirmPassword) {
        msg.textContent = "As senhas não coincidem";
        msg.className = "mt-3 text-xs text-center text-[#ff6b6b]";
        return;
      }

      const btn = document.getElementById("changePasswordBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Alterando...';

      try {
        const res = await fetch(`${API_BASE}/user/password`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            current_password: currentPassword,
            new_password: newPassword
          })
        });

        if (!res.ok) {
          const data = await res.json();
          msg.textContent = data.detail || "Erro ao alterar senha";
          msg.className = "mt-3 text-xs text-center text-[#ff6b6b]";
          return;
        }

        msg.textContent = "Senha alterada com sucesso!";
        msg.className = "mt-3 text-xs text-center text-[#86efac]";

        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
      } catch (err) {
        msg.textContent = "Erro ao alterar senha";
        msg.className = "mt-3 text-xs text-center text-[#ff6b6b]";
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">key</span> Alterar Senha';
      }
    });

    loadProfile();
  </script>

</body>
</html>
