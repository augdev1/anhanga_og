        <div class="mt-8 w-full max-w-[320px] space-y-3 text-left">

  <div>
    <label class="mb-1 block text-xs">Nome</label>

  <div>

  <div>

<button id="registerBtn"

  hover:scale-[1.03] hover:shadow-glowStrong
  active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">

</button>


<p class="mt-4 text-xs">
  Já tem conta? <a href="login.html" class="text-tertiary">Entrar</a>

<script>
const API_BASE = "/api";

// ================= REGISTER =================
async function register() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const data_nasc = document.getElementById("data_nasc").value;
  const telefone = document.getElementById("telefone").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const msg = document.getElementById("registerMessage");
  const btn = document.getElementById("registerBtn");

  msg.textContent = "";

  if (!name || !username || !password) {
    msg.textContent = "Preencha todos os campos obrigatórios";
    msg.className = "text-xs text-error";
    return;
  }

  if (password !== confirmPassword) {
    msg.textContent = "As senhas não coincidem";
    msg.className = "text-xs text-error";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Criando conta...";

  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, data_nasc, telefone, username, password })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || "Erro no cadastro");

    msg.textContent = "Conta criada com sucesso!";
    msg.className = "text-xs text-primary";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (err) {
    msg.textContent = err.message;
    msg.className = "text-xs text-error";
  } finally {
    btn.disabled = false;
    btn.textContent = "Cadastrar";
  }
}

// EVENTOS
document.getElementById("registerBtn").onclick = register;
</script>
